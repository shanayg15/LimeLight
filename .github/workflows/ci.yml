name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: limelight
          POSTGRES_PASSWORD: limelight
          POSTGRES_DB: limelight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U limelight -d limelight"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://limelight:limelight@localhost:5432/limelight
      # Dummy values — CI never authenticates real users or stores real keys.
      AUTH_SECRET: ci-dummy-secret-do-not-use-in-production
      AUTH_URL: http://localhost:3012
      ENCRYPTION_KEY: Q0ktZHVtbXktZW5jcnlwdGlvbi1rZXktMzJieXRlcyE=

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Proves migrations (incl. CREATE EXTENSION vector) apply from zero.
      - run: pnpm db:migrate

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
